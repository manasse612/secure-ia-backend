# === Configuration Alembic pour les migrations de base de données ===
# Alembic gère les changements de schéma PostgreSQL de manière incrémentale

[alembic]
# Répertoire contenant les scripts de migration
script_location = alembic

# Template pour les nouveaux fichiers de migration
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Prépend la date de création dans les fichiers
prepend_sys_path = .

# URL de connexion (sera remplacée par config.py au runtime)
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/secure_ia

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
